<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contusão - Botões de cópia</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="copy-actions" aria-label="Opções de cópia do template Contusão">
      <button class="copy-button primary" type="button" data-copy="all">
        <span class="clipboard-icon" aria-hidden="true"></span>
        <span>Copiar tudo</span>
      </button>
      <button class="copy-button" type="button" data-copy="initial">
        <span class="clipboard-icon" aria-hidden="true"></span>
        <span>Atendimento inicial</span>
      </button>
      <button class="copy-button" type="button" data-copy="reevaluation">
        <span class="clipboard-icon" aria-hidden="true"></span>
        <span>Reavaliação</span>
      </button>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite">Texto copiado</div>
    <script src="script.js"></script>
  </body>
</html>
